<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI Network</title>
    <script src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
    <style>
        html, body { margin:0; width:100%; height:100%; overflow:hidden; background: radial-gradient(circle at center, #1f2d50 0%, #111827 40%, #05070d 100%); }
        #network { width:100%; height:100%; }
        .title { position:absolute; top:20px; left:50%; transform:translateX(-50%); color:white; font-size:28px; font-weight:bold; letter-spacing:2px; z-index:10; }
    </style>
</head>
<body>

<div class="title">AI Semantic Network</div>
<div id="network"></div>

<script src="data.js"></script>

<script>

    const MIN_WEIGHT = 2;

    const filteredEdges = edgeData.filter(edge => edge.weight >= MIN_WEIGHT);
    const colors = ["#00E5FF", "#00FFA3", "#FF5EA8", "#FFD54F", "#A970FF", "#FF7043", "#26C6DA", "#42A5F5"];
    const nodeMap = {};

    filteredEdges.forEach(edge => {
        if(!nodeMap[edge.source_token]) nodeMap[edge.source_token] = { count: 0 };
        if(!nodeMap[edge.target_token]) nodeMap[edge.target_token] = { count: 0 };
        nodeMap[edge.source_token].count++;
        nodeMap[edge.target_token].count++;
    });

    let id = 1;
    const nodeIds = {};
    const nodes = [];

    Object.keys(nodeMap).forEach(word => {
        nodeIds[word] = id++;
        nodes.push({
            id: nodeIds[word],
            label: word,
            value: 15 + nodeMap[word].count * 10,
            shape: "dot",
            color: { background: colors[Math.floor(Math.random() * colors.length)], border: "#ffffff" },
            font: { color: "#ffffff", size: 20, face: "Pretendard" }
        });
    });

    const edges = filteredEdges.map(edge => ({
        from: nodeIds[edge.source_token],
        to: nodeIds[edge.target_token],
        width: Math.log(edge.weight + 1) * 2,
        color: {
            color: colors[Math.floor(Math.random() * colors.length)],
            opacity: 0.7
        },
        smooth: false
    }));

    const container = document.getElementById("network");
    const data = {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(edges)
    };

    const options = {
        physics: { enabled: true, stabilization: false, barnesHut: { gravitationalConstant: -3000, springLength: 180, springConstant: 0.02 } },
        nodes: { borderWidth: 2, shadow: { enabled: true, size: 20 } },
        edges: { shadow: { enabled: true, size: 10 } },
        interaction: { hover: true, zoomView: true, dragView: true }
    };

    const network = new vis.Network(container, data, options);

</script>
</body>
</html>
