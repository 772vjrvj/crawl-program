<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Data Storytelling</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
<div id="presentation-container">

    <section id="scene-1" class="scene active">
        <div class="video-card">
            <div class="thumbnail-wrapper">
                <img id="vid-thumb" src="" alt="유튜브 썸네일">
            </div>
            <div class="info-wrapper">
                <h2 id="vid-channel" class="channel-name">채널명</h2>
                <h1 id="vid-title" class="video-title">영상 제목이 여기에 표시됩니다.</h1>
                <div class="stats-container">
                    <div class="stat-box">
                        <span class="stat-label">조회수</span>
                        <span class="stat-value" id="vid-views">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">좋아요</span>
                        <span class="stat-value" id="vid-likes">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">댓글 수</span>
                        <span class="stat-value" id="vid-comments">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="branding-section">
            <div class="cta-container">
                <div class="cta-item" id="cta-q"><div class="mystery-egg"><span class="egg-text">?</span></div><div class="revealed-btn"><div class="css-icon-box"><div class="css-heart"></div></div><span class="cta-text">좋아요</span></div></div>
                <div class="cta-item" id="cta-w"><div class="mystery-egg"><span class="egg-text">?</span></div><div class="revealed-btn"><div class="css-icon-box"><div class="css-bubble"></div></div><span class="cta-text">댓글</span></div></div>
                <div class="cta-item" id="cta-e"><div class="mystery-egg"><span class="egg-text">?</span></div><div class="revealed-btn"><div class="css-icon-box"><div class="css-bell"></div></div><span class="cta-text">구독</span></div></div>
                <div class="cta-item" id="cta-r"><div class="mystery-egg"><span class="egg-text">?</span></div><div class="revealed-btn"><div class="css-icon-box"><div class="css-clock"></div></div><span class="cta-text">알림</span></div></div>
            </div>
            <img src="goodbye772vjrvj_main.png" alt="GB7 돌고래 마스코트" class="mascot-img">
        </div>
    </section>

    <section id="scene-2" class="scene">

        <div class="crawler-header">
            <div class="crawler-status-text">
                <span class="status-badge ocean">DEEP SEA MINING</span>
                <span class="status-main">심해 댓글 데이터 수집 중...</span>
                <span class="status-count"><b id="current-count">0</b> / <span id="total-count">4,319</span> ROWS</span>
            </div>
        </div>

        <div class="ocean-stage-vertical">
            <div class="stage-overlay" id="stage-overlay">
                <button class="start-btn ocean-btn" onclick="triggerCrawling()">데이터 수집 시작</button>
            </div>

            <div class="simple-clear-popup" id="clear-popup">
                데이터 수집 완료
            </div>

            <div class="water-circle-container">
                <canvas id="wave-canvas" width="240" height="240"></canvas>
                <div class="circle-percentage" id="cylinder-percent">0%</div>
            </div>
        </div>

        <div class="wide-log-terminal">
            <div class="terminal-scroller" id="terminal-log">
                <div class='log-line sys'>&gt;&gt; SYSTEM READY. INITIALIZE BUTTON TO STREAM DATA PIPELINE...</div>
            </div>
        </div>
    </section>

    <section id="scene-3" class="scene">
        <div id="chart-wrapper" style="display: flex; flex-direction: column; align-items: center;">
            <h1 class="scene-title">📊 감정 분석 비율</h1>

            <div id="chart"></div>

            <div id="summary">
                <div class="item pos"><div class="color-box"></div>긍정: <b id="pos-val">0% (0건)</b></div>
                <div class="item neg"><div class="color-box"></div>부정: <b id="neg-val">0% (0건)</b></div>
                <div class="item neu"><div class="color-box"></div>중립: <b id="neu-val">0% (0건)</b></div>
            </div>
        </div>
    </section>
    <section id="scene-4" class="scene">
        <h1 class="scene-title">📊 긍정 댓글 TOP 5</h1>
        <div class="rank-container" id="pos-container"></div>
    </section>

    <section id="scene-5" class="scene">
        <h1 class="scene-title">⚠️ 부정 댓글 TOP 5</h1>
        <div class="rank-container" id="neg-container"></div>
    </section>

    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-author">작성자</h2>
            <p id="modal-text" class="modal-body-text"></p>

            <div class="modal-stats">
                <div>감정 점수: <b id="modal-score"></b></div>
            </div>

            <div class="modal-reason-box">
                <h4>💡 분석 사유</h4>
                <p id="modal-reason" class="modal-reason"></p>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
